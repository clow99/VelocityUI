name: Publish velocityui to Gitea npm Registry

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://git.cameronlow.com/api/packages/${{ gitea.repository_owner }}/npm/'
          scope: '@${{ gitea.repository_owner }}'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm build:lib

      - name: Configure npm registry
        run: |
          if [ -z "${{ secrets.GITEATOKEN }}" ]; then
            echo "GITEATOKEN secret is missing or empty"
            exit 1
          fi
          OWNER_SCOPE="@${{ gitea.repository_owner }}"
          REGISTRY_URL="https://git.cameronlow.com/api/packages/${{ gitea.repository_owner }}/npm/"
          REGISTRY_AUTH="//git.cameronlow.com/api/packages/${{ gitea.repository_owner }}/npm/:_authToken=${{ secrets.GITEATOKEN }}"
          echo "${OWNER_SCOPE}:registry=${REGISTRY_URL}" >> ~/.npmrc
          echo "${REGISTRY_AUTH}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Normalize package scope for Gitea owner
        working-directory: packages/velocityui
        run: |
          OWNER_SCOPE="@${{ gitea.repository_owner }}"
          PACKAGE_BASENAME=$(node -p "JSON.parse(require('fs').readFileSync('./package.json','utf8')).name.split('/').pop()")
          TARGET_PACKAGE_NAME="${OWNER_SCOPE}/${PACKAGE_BASENAME}"
          npm pkg set name="$TARGET_PACKAGE_NAME"
          echo "Publishing package as $TARGET_PACKAGE_NAME"

      - name: Check if version already published
        id: version_check
        working-directory: packages/velocityui
        run: |
          PACKAGE_NAME=$(node -p "JSON.parse(require('fs').readFileSync('./package.json','utf8')).name")
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./package.json','utf8')).version")
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$PACKAGE_NAME@$VERSION" --registry https://git.cameronlow.com/api/packages/${{ gitea.repository_owner }}/npm/ 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITEATOKEN }}

      - name: Publish to Gitea
        if: steps.version_check.outputs.already_published == 'false'
        working-directory: packages/velocityui
        run: npm publish --registry https://git.cameronlow.com/api/packages/${{ gitea.repository_owner }}/npm/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITEATOKEN }}
